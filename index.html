<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>GitHub README Generator</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <h1>🚀 GitHub README Generator</h1>

    <p class="subtitle">
        Generate a professional GitHub Profile README instantly.
    </p>

    <!-- Username -->

    <input
        type="text"
        id="username"
        placeholder="Enter GitHub Username"
        autocomplete="off">

    <!-- Template -->

    <div class="template-box">

        <label for="template">

            Select README Template

        </label>

        <select id="template">

            <option value="developer">
                Developer
            </option>

            <option value="student">
                Student
            </option>

            <option value="fullstack">
                Full Stack
            </option>

        </select>

    </div>

    <!-- Theme -->

    <div class="theme-box">

        <label for="themeSelect">

            GitHub Stats Theme

        </label>

        <select id="themeSelect">

            <option value="github_dark">
                GitHub Dark
            </option>

            <option value="radical">
                Radical
            </option>

            <option value="tokyonight">
                Tokyo Night
            </option>

            <option value="dracula">
                Dracula
            </option>

        </select>

    </div>

    <!-- Main Buttons -->

    <button id="generateBtn">

        🚀 Generate README

    </button>

    <button id="resetBtn">

        🔄 Reset

    </button>

    <!-- Preview -->

    <div id="preview">

        <h2>

            GitHub Profile

        </h2>

        <div id="profile">

            <p>

                Enter GitHub username and click Generate.

            </p>

        </div>

        <hr>

        <h2>

            Generated README

        </h2>

        <textarea

            id="readmeOutput"

            rows="18"

            readonly>

        </textarea>

        <!-- Action Buttons -->

        <div class="button-group">

            <button id="copyBtn">

                📋 Copy README

            </button>

            <button id="downloadBtn">

                ⬇ Download README

            </button>

        </div>

        <p id="message"></p>

        <hr>

        <h2>

            Live Preview

        </h2>

        <div id="livePreview">

            README Preview will appear here...

        </div>

    </div>

</div>

<script src="js/script.js"></script>

</body>

</html>
