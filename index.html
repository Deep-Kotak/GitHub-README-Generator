<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>GitHub README Generator v2.0</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- Header -->

    <header>

        <h1>🚀 GitHub README Generator</h1>

        <p>
            Generate a professional GitHub Profile README in seconds.
        </p>

    </header>

    <!-- Search Section -->

    <section class="search-box">

        <input
            type="text"
            id="username"
            placeholder="Enter GitHub Username">

        <button id="generateBtn">

            Generate README

        </button>

    </section>

    <!-- Settings -->

    <section class="settings">

        <div class="setting">

            <label>

                README Template

            </label>

            <select id="template">

                <option value="developer">

                    Developer

                </option>

                <option value="student">

                    Student

                </option>

                <option value="fullstack">

                    Full Stack

                </option>

            </select>

        </div>

        <div class="setting">

            <label>

                Theme

            </label>

            <select id="themeSelect">

                <option value="github_dark">

                    GitHub Dark

                </option>

                <option value="radical">

                    Radical

                </option>

                <option value="tokyonight">

                    Tokyo Night

                </option>

                <option value="dracula">

                    Dracula

                </option>

            </select>

        </div>

    </section>

    <!-- Profile -->

    <section>

        <h2>

            👤 GitHub Profile

        </h2>

        <div id="profile"
             class="profile-card">

            <p>

                Search any GitHub user.

            </p>

        </div>

    </section>

    <!-- Live Preview -->

    <section>

        <h2>

            📄 Live Preview

        </h2>

        <div id="livePreview"
             class="preview-card">

            README Preview will appear here...

        </div>

    </section>

    <!-- README -->

    <section>

        <h2>

            📝 Generated README

        </h2>

        <textarea
            id="readmeOutput"
            readonly>

        </textarea>

    </section>

    <!-- Buttons -->

    <section class="button-group">

        <button id="copyBtn">

            📋 Copy README

        </button>

        <button id="downloadBtn">

            ⬇ Download README

        </button>

        <button id="resetBtn">

            🔄 Reset

        </button>

    </section>

    <p id="message"></p>

</div>

<script src="js/script.js"></script>

</body>

</html>
