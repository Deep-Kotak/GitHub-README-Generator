<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GitHub README Generator</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <div class="container">

        <!-- ================= HERO ================= -->

        <header class="hero">

            <h1>🚀 GitHub README Generator</h1>

            <p>
                Generate beautiful GitHub Profile README files using the GitHub REST API.
            </p>

        </header>

        <!-- ================= SEARCH ================= -->

        <div class="search-card">

            <input
                type="text"
                id="username"
                placeholder="Enter GitHub Username">

            <button id="generateBtn">

                Generate README

            </button>

        </div>

        <!-- ================= SETTINGS ================= -->

        <div class="settings-grid">

            <div class="setting-card">

                <label>README Template</label>

                <select id="template">

                    <option value="developer">
                        Developer
                    </option>

                    <option value="student">
                        Student
                    </option>

                    <option value="fullstack">
                        Full Stack
                    </option>

                </select>

            </div>

            <div class="setting-card">

                <label>Theme</label>

                <select id="themeSelect">

                    <option value="github_dark">
                        GitHub Dark
                    </option>

                    <option value="radical">
                        Radical
                    </option>

                    <option value="tokyonight">
                        Tokyo Night
                    </option>

                    <option value="dracula">
                        Dracula
                    </option>

                </select>

            </div>

        </div>

        <!-- ================= PROFILE + PREVIEW ================= -->

        <div class="top-grid">

            <section class="card">

                <h2>👤 GitHub Profile</h2>

                <div
                    id="profile"
                    class="profile-card">

                    <p>

                        Search any GitHub username to view profile information.

                    </p>

                </div>

            </section>

            <section class="card">

                <h2>📄 Live Preview</h2>

                <div
                    id="livePreview"
                    class="preview-card">

                    README Preview will appear here...

                </div>

            </section>

        </div>

        <!-- ================= README ================= -->

        <section class="card">

            <h2>📝 Generated README</h2>

            <textarea
                id="readmeOutput"
                readonly></textarea>

        </section>

        <!-- ================= BUTTONS ================= -->

        <div class="button-group">

            <button id="copyBtn">

                📋 Copy README

            </button>

            <button id="downloadBtn">

                ⬇ Download README

            </button>

            <button id="resetBtn">

                🔄 Reset

            </button>

        </div>

        <p id="message"></p>

    </div>

    <script src="js/script.js"></script>

</body>

</html>
