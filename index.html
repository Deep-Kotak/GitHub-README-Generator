<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>GitHub README Generator</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="container">

    <h1>🚀 GitHub README Generator</h1>

    <p>
        Generate a professional GitHub Profile README instantly.
    </p>

    <input
        type="text"
        id="username"
        placeholder="Enter GitHub Username">

    <button id="generateBtn">
        Generate README
    </button>

  <div id="preview">

    <h3>GitHub Profile</h3>

    <div id="profile">

        <p>
            Enter a GitHub username and click Generate.
        </p>

    </div>

</div>
<script src="js/script.js"></script>

</body>
</html>
